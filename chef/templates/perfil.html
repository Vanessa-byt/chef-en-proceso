{% extends "base.html" %}

{% block content %}

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<nav class="navbar navbar-expand-lg fixed-top" style="background-color: #659158;">
  <div class="container-fluid">
    <span class="navbar-brand mx-auto text-white fw-bold">Chef en proceso</span>

    {% if user %}
    <div class="dropdown">
      <a class="d-flex align-items-center text-decoration-none dropdown-toggle"
         href="#"
         role="button"
         data-bs-toggle="dropdown">
         <span class="text-white fw-bold">{{ user['name'] }}</span>
      </a>
      <ul class="dropdown-menu dropdown-menu-end">
        <li><span class="dropdown-item-text">{{ user['name'] }}</span></li>
        <li><a class="dropdown-item" href="{{ url_for('recetario') }}"><i class="bi bi-book"></i> Recetario</a></li>
        <li><a class="dropdown-item" href="{{ url_for('perfil') }}"><i class="bi bi-person-fill"></i> Perfil</a></li>
        <li><hr class="dropdown-divider"></li>
        <li><a class="dropdown-item" href="{{ url_for('logout') }}"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</a></li>
      </ul>
    </div>
    {% else %}
    <a class="btn btn-outline-light ms-3" href="{{ url_for('login') }}">Iniciar sesión</a>
    {% endif %}
  </div>
</nav>

<div class="container" style="margin-top:120px; max-width:600px;">
  <div class="card shadow-lg">
    <div class="card-header bg-success text-white text-center">
      <h4>Editar perfil</h4>
    </div>
    <div class="card-body">
      <form method="POST" action="{{ url_for('editar_perfil') }}">
        <div class="mb-3">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-control" name="nombre" value="{{ usuario.nombre }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Apellido</label>
          <input type="text" class="form-control" name="apellido" value="{{ usuario.apellido }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" name="email" value="{{ usuario.email }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Nueva contraseña (opcional)</label>
          <input type="password" class="form-control" name="password">
        </div>
        <button type="submit" class="btn btn-success w-100">Guardar cambios</button>
      </form>
    </div>
  </div>
</div>

{% endblock %}
