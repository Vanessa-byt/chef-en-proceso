{% extends "base.html" %}

{% block content %}
<div class="container-fluid d-flex justify-content-center align-items-center vh-100"
     style="background-image: url('{{ url_for('static', filename='fondo inicio1.avif') }}'); background-size: cover; background-repeat: no-repeat; background-position: center;">
    <div class="p-4 rounded text-white text-center" style="background-color: #4688a1; width:500px; height:600px;">
        <h4 class="mb-3">Restablecer tu contraseña</h4>
        <div class="p-4 rounded text-start bg-white mx-auto" style="width:400px; height:470px;">
            <div class="text-center mb-3">
                <i class="bi bi-lock-fill text-dark" style="font-size:70px;"></i>
            </div>
            <h4 class="text-dark text-center">Ingresa tu nueva contraseña</h4>

            <form class="text-dark" method="POST">
                <div class="mb-3">
                    <label class="form-label">Nueva contraseña</label>
                    <input type="password" class="form-control" name="password" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Confirmar contraseña</label>
                    <input type="password" class="form-control" name="confirm_password" required>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-primary">Actualizar contraseña</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
