{% extends "base.html" %}

{% block content %}
<div class="container-fluid d-flex justify-content-center align-items-center min-vh-100"
     style="background-image: url('{{ url_for('static', filename='img/inicio.avif') }}'); background-size: cover; background-repeat: no-repeat; background-position: center;">
    <div class="p-4 text-white text-center" style="background-color: #4688a1; width:500px; max-width:95%; border-radius:40px;">
        <h4 class="mb-3">¡BIENVENIDO A CHEF EN PROCESO!</h4>
        <div class="p-4 text-start bg-white mx-auto" style="width:400px; max-width:100%; border-radius:30px;">
            <div class="text-center mb-3">
                <i class="bi bi-person-fill text-dark" style="font-size:70px;"></i>
            </div>
            <h4 class="text-dark text-center">Inicio de sesión de usuario</h4>

            {% if mensaje %}
            <div class="alert alert-danger text-center mt-2" style="border-radius:20px;">{{ mensaje }}</div>
            {% endif %}

            <form class="text-dark" action="{{ url_for('login') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label">Ingresa tu email</label>
                    <input type="email" class="form-control" name="email" required style="border-radius:15px;">
                </div>

                <div class="mb-3">
                    <div class="d-flex justify-content-between align-items-center gap-2">
                        <label class="form-label mb-0">Contraseña</label>
                        <a href="{{ url_for('olvidaste') }}" class="text-decoration-none">Olvidé la contraseña</a>
                    </div>
                    <input type="password" class="form-control" name="password" required style="border-radius:15px;">
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-primary" style="border-radius:20px;">Iniciar sesión</button>
                </div>

                <p class="text-center mt-3">
                    ¿No tienes cuenta aún? <a href="{{ url_for('crear_cuenta') }}">Crea una aquí</a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
